version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lshop-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/vendor
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=lshop
      - DB_USERNAME=lshop
      - DB_PASSWORD=lshop_password
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_DRIVER=redis
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - lshop-network
    restart: unless-stopped
    command: /bin/bash /app/start.sh

  db:
    image: mysql:8.0
    container_name: lshop-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lshop
      MYSQL_USER: lshop
      MYSQL_PASSWORD: lshop_password
    ports:
      - "3306:3306"
    volumes:
      - lshop-db-data:/var/lib/mysql
    networks:
      - lshop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lshop-redis
    ports:
      - "6379:6379"
    volumes:
      - lshop-redis-data:/data
    networks:
      - lshop-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  node:
    image: node:18-alpine
    container_name: lshop-node
    working_dir: /app
    volumes:
      - .:/app
    command: npm run dev
    ports:
      - "5173:5173"
    networks:
      - lshop-network

volumes:
  lshop-db-data:
  lshop-redis-data:

networks:
  lshop-network:
    driver: bridge
